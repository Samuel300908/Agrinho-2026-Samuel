<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Agrinho 2026 | Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>Agrinho <span>2026</span></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="acoes.html">Ações</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 class="section-title">Fale Conosco</h2>
        <div class="contact-form">
            <form id="agrinhoForm">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome">
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" required placeholder="seuemail@exemplo.com">
                </div>
                <div class="form-group">
                    <label for="mensagem">Sua Mensagem / Sugestão:</label>
                    <textarea id="mensagem" rows="5" required placeholder="Como você pode colaborar com o nosso Agrinho?"></textarea>
                </div>
                <button type="submit">Enviar Mensagem</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Projeto Agrinho Escolar. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
